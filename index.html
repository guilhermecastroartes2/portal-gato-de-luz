<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Portal Gato de Luz</title>

  <link rel="stylesheet" href="style.css">

  <!-- Fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">

</head>

<body>

  <!-- UNIVERSO CÓSMICO -->
  <div class="universo"></div>

  <!-- NEBULOSA -->
  <div class="nebulosa"></div>

  <!-- PARTÍCULAS -->
  <canvas id="particulas"></canvas>

  <!-- CONTEÚDO PRINCIPAL -->
  <div class="teia-de-luz-container">

    <!-- CABEÇALHO -->
    <header>

      <h1 class="titulo-hq">Gato de Luz</h1>

      <p>
        Olhe para dentro e perceba que você nunca esteve sozinho.
      </p>

    </header>

    <!-- CAPA -->
    <div class="capa-container">

      <img
        src="imagens/gato-de-luz-bem-vindo.jpg"
        alt="Bem-vindo ao Portal do Gato de Luz"
        class="imagem-capa"
      >

    </div>

    <!-- GRADE HQ -->
    <div class="grade-hq">

      <div class="painel-hq">

        <img
          src="imagens/gato-de-luz-1.jpg"
          alt="Gato de Luz Pop-Art Energia e Amor"
          class="imagem-hq"
        >

      </div>

      <div class="painel-hq">

        <img
          src="imagens/gato-de-luz-2.jpg"
          alt="Gato de Luz vibrando amor e cura"
          class="imagem-hq"
        >

      </div>

      <div class="painel-hq">

        <img
          src="imagens/gato-de-luz-3.jpg"
          alt="Gato de Luz meditando na teia"
          class="imagem-hq"
        >

      </div>

    </div>

  </div>

  <!-- SCRIPT -->
  <script src="script.js"></script>

</body>

</html>
